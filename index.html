<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Registro del usuario</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
    <main>
        <h1 id="titulo"> Registro de la persona unitaria</h1>
        <form action="#"  class="formulario-registro">
            <div class="campo">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre">
            </div>
            <div class="campo">
            <label for="apellido">Apellido:</label>
            <input type="text" id="apellido" name="apellido">
            </div>
            <div class="campo">
            <label for="correo">Correo:</label>
            <input type="email" id="correo" name="correo">
            </div>
            <div class="campo">
            <label for="contraseña">Contraseña:</label>
            <input type="password" id="contraseña" name="contraseña">
            </div>
            <div class="campo">
            <label for="introduccion"> Introduzca un poco sobre usted: </label>
            <textarea name="introduccion" id="introduccion"
            rows="5"
            cols="50"> </textarea>
            </div>
            <div class="campo">
            <label>Seleccione sus intereses:</label>
            <br>
            <input type="checkbox" id="arte"  name="intereses" value="arte">
            <label for="arte">Arte</label>
            <input type="checkbox" id="deporte" name="intereses" value="deporte">
            <label for="deporte">Deporte</label>
            <input type="checkbox" id="tecnologia"  name="intereses" value="tecnologia">
            <label for="tecnologia">Tecnología</label>
            <input type="checkbox" id="moda"  name="intereses" value="moda">
            <label for="moda">Moda</label>
            <input type="checkbox" id="ciencia"  name="intereses" value="ciencia">
            <label for="ciencia">Ciencia</label>
            <input type="checkbox" id="cultura"  name="intereses" value="cultura">
            <label for="cultura">Cultura</label>
            <label for="registrarse"></label>
            </div>
            <br>
            <input type="submit" id="boton-enviar" value="Registrarse">
        </form>
    </main>
    </body>
</html>
